directive @inherits(type: String!) on OBJECT

type Viewer {
  id: ID
  firstName: String
  lastName: String
  email: String
  token: String
  role: UserRole
  redirectTo: String
  didRequest: Boolean!
}

type Query {
  viewer: Viewer!
  streams(limit: Int, offset: Int, where: Where, sortBy: String): PaginatedStreams!
  stream(id: String!): Stream!
  tests(limit: Int, offset: Int, where: Where, sortBy: String): PaginatedTests!
  test(id: String!): Test!
}

type Mutation {
  login(email: String, password: String): Viewer!
  logout: Boolean!
  createTest(input: CreateTestInput): Test!
  updateTest(id: String!, input: CreateTestInput): Test!
  deleteTest(id: String!): Boolean!
}

type PaginatedStreams implements PaginatedDocs {
  total: Int!
  items: [Stream!]
}

type PaginatedTests implements PaginatedDocs {
  total: Int!
  items: [Test!]
}

input CreateTestInput {
  text: String!
}

enum UserStatus {
  ACTIVE
  INACTIVE
}

enum UserRole {
  USER
}

enum ActivityLogActionType {
  READ
  CREATE
  UPDATE
  DELETE
}

enum ActivityLogEntityType {
  USER
  SESSION
}

enum StreamStatus {
  ACTIVE
  INACTIVE
}

enum StreamTag {
  NEWS
}

type Test {
  id: String!
  text: String!
  createdAt: Date!
  updatedAt: Date!
}

type User {
  id: String!
  firstName: String!
  lastName: String!
  email: String!
  password: String
  status: UserStatus!
  role: UserRole!
  failedLoginAttempts: Int!
  lastLoginAttempt: Date
  resetPasswordToken: String
  resetPasswordTokenExpiry: String
  createdAt: Date!
  updatedAt: Date!
  deletedAt: Date
  sessions: [Session!]
  activityLogs: [ActivityLog!]
  subscriptions: [StreamSubscription!]
}

type Session {
  id: String!
  token: String!
  userId: String!
  user: User!
  ipAddress: String
  userAgent: String
  expiresAt: Date!
  createdAt: Date!
  updatedAt: Date!
  deletedAt: Date
}

type ActivityLog {
  id: String!
  publicId: Int!
  userId: String
  user: User
  type: ActivityLogActionType!
  entityType: ActivityLogEntityType!
  entityId: String!
  description: String
  systemLog: Boolean!
  createdAt: Date!
  updatedAt: Date!
}

type Stream {
  id: String!
  name: String!
  price: Float!
  excerpt: String!
  description: String
  marketingTitle: String
  bulletPoints: [String!]
  imageUrl: String
  tags: [StreamTag!]
  status: StreamStatus!
  availability: [Int!]
  createdAt: Date!
  updatedAt: Date!
  subscriptions: [StreamSubscription!]
}

type StreamSubscription {
  id: String!
  userId: String!
  user: User!
  streamId: String!
  stream: Stream!
  price: Float!
  selectedDays: [Int!]
  startDate: Date!
  cancelledAt: Date
  createdAt: Date!
  updatedAt: Date!
}

scalar Date

scalar JSON

interface PaginatedDocs {
  total: Int!
}

enum WhereFieldMode {
  default
  insensitive
}

input WhereField {
  equals: JSON
  contains: JSON
  not_equals: JSON
  in: JSON
  not_in: JSON
  exists: JSON
  gt: JSON
  gte: JSON
  lt: JSON
  lte: JSON
  mode: WhereFieldMode
}

input RelationWhere {
  some: Where
  every: Where
  none: Where
  is: Where
  isNot: Where
}

input Where {
  and: [Where]
  or: [Where]
  field: String
  value: WhereField
  relation: RelationWhere
}

schema {
  query: Query
  mutation: Mutation
}