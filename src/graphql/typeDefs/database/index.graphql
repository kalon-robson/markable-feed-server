enum UserStatus {
  ACTIVE
  INACTIVE
}

enum UserRole {
  USER
}

enum ActivityLogActionType {
  READ
  CREATE
  UPDATE
  DELETE
}

enum ActivityLogEntityType {
  USER
  SESSION
}

type Test {
  id: String!
  text: String!
  createdAt: Date!
  updatedAt: Date!
}

type User {
  id: String!
  firstName: String!
  lastName: String!
  email: String!
  password: String
  status: UserStatus!
  role: UserRole!
  failedLoginAttempts: Int!
  lastLoginAttempt: Date
  resetPasswordToken: String
  resetPasswordTokenExpiry: String
  createdAt: Date!
  updatedAt: Date!
  deletedAt: Date
  sessions: [Session!]
  activityLogs: [ActivityLog!]
}

type Session {
  id: String!
  token: String!
  userId: String!
  user: User!
  ipAddress: String
  userAgent: String
  expiresAt: Date!
  createdAt: Date!
  updatedAt: Date!
  deletedAt: Date
}

type ActivityLog {
  id: String!
  publicId: Int!
  userId: String
  user: User
  type: ActivityLogActionType!
  entityType: ActivityLogEntityType!
  entityId: String!
  description: String
  systemLog: Boolean!
  createdAt: Date!
  updatedAt: Date!
}